# Pre-commit hooks — security + auto-fix tier.
# Strictness hooks (mypy --strict, pytest, conventional-commits) are
# deferred until after Phase 3.1 ships the first real tailored application.
#
# Install:  pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push
# Run all:  pre-commit run --all-files
# Pre-push: pre-commit run --hook-stage pre-push --all-files

repos:

  # ──────────────────────────────────────────────
  # Auto-fix (silent, never blocks)
  # ──────────────────────────────────────────────

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--unsafe]   # ruamel-style multi-document support
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16  # keep in lockstep with pyproject [dev] ruff pin
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ──────────────────────────────────────────────
  # Docs-as-code (markdown + typos)
  # ──────────────────────────────────────────────

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # Config in pyproject.toml [tool.codespell].
        additional_dependencies: ["tomli"]

  # ──────────────────────────────────────────────
  # Security (blocks disasters)
  # ──────────────────────────────────────────────

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # designs/ holds the design team's verbatim prototype HTML; its only
        # high-entropy strings are public CDN SRI integrity hashes, not secrets.
        exclude: package.lock.json|^\.secrets\.baseline$|^designs/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ──────────────────────────────────────────────
  # Custom local hooks
  # ──────────────────────────────────────────────

  - repo: local
    hooks:
      - id: pii-scan
        name: Block PII patterns
        entry: .githooks/pii-scan.sh
        language: script
        types: [text]

      - id: people-guard
        name: Block people/{name}/ commits except demo
        entry: .githooks/people-guard.sh
        language: script

      # Last local gate before code leaves the machine. Full-history secret
      # scan + PII/people guard over all tracked files. Mirrors the CI
      # `security` job. Needs: pre-commit install --hook-type pre-push
      - id: pre-push-guard
        name: Pre-push secret + PII gate
        entry: .githooks/pre-push-guard.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: Type check (mypy) — mirrors CI
        entry: python -m mypy src/matchbox/
        language: system
        pass_filenames: false
        types: [python]
