{% if jobs %}
{% for job in jobs %}
{% include "components/job_row.html" %}
{% endfor %}
{% else %}
<tr>
    <td colspan="9" class="px-4 py-12 text-center">
        <div class="text-slate-400 text-sm">No jobs match these filters.</div>
        <div class="mt-2 text-xs text-slate-500">
            Try <a href="/p/{{ active_profile }}/inbox" class="text-indigo-600 hover:underline">resetting filters</a>
            or run <code class="text-xs bg-slate-100 px-1.5 py-0.5 rounded">matchbox scan {{ active_profile }}</code>
        </div>
    </td>
</tr>
{% endif %}
