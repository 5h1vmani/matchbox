# Scoring rubric — 6-dimension model.
# Dimension weights sum to 1.0. Override per-profile in profile.yaml:scoring.
# Ported from v0.1; weights are defaults; adjust per evidence.

_meta:
  schema_version: 1

dimensions:
  role_fit:
    description: How well the role title and function map to the candidate's targets.
    default_weight: 0.25

  company_mission:
    description: Alignment between the company's mission and the candidate's stated interests.
    default_weight: 0.15

  tech_stack:
    description: Overlap between the JD's required stack and the candidate's demonstrated skills.
    default_weight: 0.20

  seniority:
    description: Level match — over-qualified and under-qualified both score low.
    default_weight: 0.15

  location_remote:
    description: Geographic and remote-work compatibility.
    default_weight: 0.15

  compensation:
    description: Compensation range compatibility (requires comp.yaml or profile.yaml:compensation).
    default_weight: 0.10

scoring:
  # Score bands → tier routing
  tiers:
    tier_1_bespoke:    { min: 0.80, label: "bespoke" }
    tier_2_template:   { min: 0.60, label: "template" }
    tier_3_canonical:  { min: 0.40, label: "canonical" }
    tier_4_skip:       { min: 0.00, label: "skip" }
