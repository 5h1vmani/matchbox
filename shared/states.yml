_meta:
  id: states
  purpose: Canonical pipeline state machine for Matchbox applications
  sensitivity: public
  relevant_for: [all_tasks]
  not_for: []
  last_updated: 2026-04-19
  review_by: 2026-10-19
  size_budget: 1500_tokens

note: |
  Every applications.md row has one of these states.
  Transitions are unidirectional in the typical flow (evaluated → applied → responded → interview → offer/rejected).
  Any state may transition to discarded.

states:
  - id: evaluated
    label: Evaluated
    aliases: [pending, awaiting_decision]
    description: Report written, awaiting human decision to apply
    dashboard_group: backlog

  - id: applied
    label: Applied
    aliases: [submitted]
    description: Submitted to company
    dashboard_group: in_progress

  - id: responded
    label: Responded
    aliases: [company_replied, no_interview_yet]
    description: Company has replied (not yet interview)
    dashboard_group: in_progress

  - id: interview
    label: Interview
    aliases: [active_interview]
    description: Active interview process
    dashboard_group: in_progress

  - id: offer
    label: Offer
    aliases: [accepted_offer]
    description: Offer received
    dashboard_group: outcomes

  - id: rejected
    label: Rejected
    aliases: [declined]
    description: Rejected by company
    dashboard_group: outcomes

  - id: discarded
    label: Discarded
    aliases: [withdrawn, withdrawn_by_candidate]
    description: Candidate withdrew or posting closed
    dashboard_group: outcomes

  - id: skip
    label: Skip
    aliases: [auto_skipped]
    description: Auto-skipped (score below threshold or ghost posting)
    dashboard_group: filtered

  - id: cooling
    label: Cooling
    aliases: [frozen, sibling_hold]
    description: Frozen pending sibling applications at same company. User-chosen pause to avoid spray-and-pray signal. Thaw by setting back to evaluated.
    dashboard_group: filtered
