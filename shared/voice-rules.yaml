# Universal voice rules — shipped with the repo, MIT licensed.
# Per-profile overrides live in people/{name}/voice.yaml.
# Lists: overrides APPEND unless the override sets replace: true.
# Maps: overrides REPLACE by key.

_meta:
  schema_version: 1

hard_rules:
  no_em_dashes: true
  no_contractions: true
  no_passive_voice: true

banned_words:
  - leverage
  - synergy
  - synergize
  - passionate about
  - spearhead
  - orchestrate
  - spearheaded
  - seasoned
  - results-driven
  - dynamic
  - thought leader
  - visionary
  - innovative
  - cutting-edge
  - robust
  - scalable  # only when used as an empty adjective, not a measured claim
  - utilize   # use "use"
  - facilitate

banned_openers:
  - "I am writing to"
  - "I am excited to"
  - "As a [role] with [years]"
  - "I have always been passionate"
  - "Throughout my career"
  - "I am a highly motivated"

required_signals:
  min_named_entities_per_150_words: 3   # company names, product names, role names
  min_numbers_per_150_words: 2          # quantified claims
  min_authenticity_signals: 3           # costly signals, specific details, named experiences

quality_gates:
  max_word_count_cv_bullet: 25
  min_word_count_cv_bullet: 8
  max_bullets_per_role: 5
  min_bullets_per_role: 2
