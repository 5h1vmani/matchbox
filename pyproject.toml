[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "matchbox"
version = "0.2.0"
description = "AI-assisted job application pipeline — scan, score, tailor, track."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.49.0",
    "pydantic>=2.7",
    "typer>=0.12",
    "streamlit>=1.35",
    "rich>=13.7",
    "ruamel.yaml>=0.18",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.4",
    "types-PyYAML",
]

[project.scripts]
matchbox = "matchbox.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/matchbox"]

[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src/matchbox"]
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
