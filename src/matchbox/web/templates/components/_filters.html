<form id="filters"
      class="flex flex-wrap items-center gap-2 px-4 py-2.5 bg-white border-b border-slate-200 sticky top-14 z-20"
      hx-get="/p/{{ active_profile }}/jobs"
      hx-trigger="change from:find select, change from:find input[type=checkbox], input delay:300ms from:find input[type=search]"
      hx-target="#job-rows"
      hx-swap="innerHTML"
      hx-include="this">

    <input type="search" name="q" value="{{ filter_q }}"
           placeholder="Search role…"
           class="text-sm w-48 border-slate-200 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
           data-shortcut="search">

    <select name="order" class="text-sm border-slate-200 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
        {% set orders = [('score','Score (high→low)'),('score_asc','Score (low→high)'),('newest','Newest'),('company','Company'),('state','State'),('starred','Starred first')] %}
        {% for k, label in orders %}
        <option value="{{ k }}" {% if k == order_key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>

    <details class="relative" x-data="{open:false}" @toggle="open = $el.open">
        <summary class="text-sm cursor-pointer select-none px-2.5 py-1.5 rounded-md
                        {% if filter_states %}bg-indigo-50 text-indigo-700 font-medium{% else %}bg-slate-50 hover:bg-slate-100 text-slate-700{% endif %}">
            State {% if filter_states %}<span class="ml-1 text-xs">({{ filter_states|length }})</span>{% endif %}
        </summary>
        <div class="absolute left-0 mt-1 bg-white border border-slate-200 rounded-md shadow-lg p-2 w-48 z-10">
            {% for s in valid_states %}
            <label class="flex items-center gap-2 text-sm py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                <input type="checkbox" name="state" value="{{ s }}"
                       {% if s in filter_states %}checked{% endif %}
                       class="rounded text-indigo-600 focus:ring-indigo-500">
                <span class="capitalize">{{ s.replace('_', ' ') }}</span>
            </label>
            {% endfor %}
        </div>
    </details>

    <details class="relative">
        <summary class="text-sm cursor-pointer select-none px-2.5 py-1.5 rounded-md
                        {% if filter_tiers %}bg-indigo-50 text-indigo-700 font-medium{% else %}bg-slate-50 hover:bg-slate-100 text-slate-700{% endif %}">
            Tier {% if filter_tiers %}<span class="ml-1 text-xs">({{ filter_tiers|length }})</span>{% endif %}
        </summary>
        <div class="absolute left-0 mt-1 bg-white border border-slate-200 rounded-md shadow-lg p-2 w-44 z-10">
            {% for t in valid_tiers %}
            <label class="flex items-center gap-2 text-sm py-1 px-2 hover:bg-slate-50 rounded cursor-pointer">
                <input type="checkbox" name="tier" value="{{ t }}"
                       {% if t in filter_tiers %}checked{% endif %}
                       class="rounded text-indigo-600 focus:ring-indigo-500">
                <span class="inline-flex items-center gap-1.5">
                    <span class="inline-block w-2 h-2 rounded-full
                        {% if t == 'bespoke' %}bg-rose-500
                        {% elif t == 'template' %}bg-amber-500
                        {% elif t == 'canonical' %}bg-emerald-500
                        {% else %}bg-slate-400{% endif %}"></span>
                    {{ t }}
                </span>
            </label>
            {% endfor %}
        </div>
    </details>

    <label class="flex items-center gap-1.5 text-sm text-slate-600">
        Min score
        <input type="number" name="min_score" min="0" max="5" step="0.5" value="{{ filter_min_score }}"
               class="w-16 text-sm border-slate-200 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
    </label>

    <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
        <input type="checkbox" name="starred" value="1"
               {% if filter_starred %}checked{% endif %}
               class="rounded text-indigo-600 focus:ring-indigo-500">
        ⭐ Starred
    </label>

    <a href="/p/{{ active_profile }}/inbox"
       class="ml-auto text-xs text-slate-500 hover:text-slate-900">Reset</a>

    <span class="htmx-indicator text-xs text-slate-400">Loading…</span>
</form>
