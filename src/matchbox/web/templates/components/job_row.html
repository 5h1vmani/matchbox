<tr id="row-{{ job.id }}"
    class="job-row group border-b border-slate-100 hover:bg-slate-50 cursor-pointer
           data-[selected=true]:bg-indigo-50/40 data-[active=true]:bg-indigo-50"
    hx-get="/p/{{ active_profile }}/jobs/{{ job.id }}/detail"
    hx-target="#detail-panel"
    hx-swap="innerHTML"
    @click="panel = true; $dispatch('row:active', { id: {{ job.id }} })"
    data-job-id="{{ job.id }}">

    <td class="px-3 py-2 w-8" @click.stop>
        <input type="checkbox" name="id" value="{{ job.id }}" form="bulk-form"
               class="row-select rounded text-indigo-600 focus:ring-indigo-500">
    </td>

    <td class="px-2 py-2 w-8" @click.stop>
        <button type="button"
                hx-post="/p/{{ active_profile }}/jobs/{{ job.id }}/star"
                hx-target="#row-{{ job.id }}"
                hx-swap="outerHTML"
                onclick="this.classList.toggle('text-amber-400'); this.classList.toggle('text-slate-300')"
                aria-pressed="{{ 'true' if job.is_starred else 'false' }}"
                aria-label="{% if job.is_starred %}Starred — click to unstar{% else %}Star this job{% endif %}"
                class="text-lg leading-none transition-colors {% if job.is_starred %}text-amber-400{% else %}text-slate-300 hover:text-amber-400{% endif %}"
                title="{% if job.is_starred %}Starred{% else %}Star{% endif %}">★</button>
    </td>

    <td class="px-3 py-2 w-24">
        <div class="flex items-center gap-2">
            <div class="w-12 h-1.5 rounded-full bg-slate-200 overflow-hidden">
                <div class="h-full {% if (job.total_score or 0) >= 4 %}bg-emerald-500
                                   {% elif (job.total_score or 0) >= 3 %}bg-sky-500
                                   {% elif (job.total_score or 0) >= 2 %}bg-amber-500
                                   {% else %}bg-slate-400{% endif %}"
                     style="width: {{ ((job.total_score or 0) / 5 * 100) | round(0) }}%"></div>
            </div>
            <span class="text-xs font-medium {{ job.total_score | score_color }}">
                {{ job.total_score | score }}
            </span>
        </div>
    </td>

    <td class="px-3 py-2 w-24">
        {% if job.tier %}
        <span class="inline-flex items-center text-xs px-2 py-0.5 rounded-full ring-1 ring-inset {{ job.tier | tier_class }}">
            {{ job.tier }}
        </span>
        {% else %}<span class="text-xs text-slate-300">—</span>{% endif %}
    </td>

    <td class="px-3 py-2 font-medium text-slate-900 truncate max-w-[14rem]">{{ job.company }}</td>

    <td class="px-3 py-2 text-slate-700 truncate max-w-[18rem]">{{ job.role }}</td>

    <td class="px-3 py-2 text-xs text-slate-500 truncate max-w-[10rem]">
        {{ job.location or '—' }}
    </td>

    <td class="px-3 py-2 w-32">
        <span class="inline-flex items-center text-xs px-2 py-0.5 rounded-full ring-1 ring-inset {{ job.state | state_class }}">
            {{ job.state.replace('_', ' ') }}
        </span>
    </td>

    <td class="px-3 py-2 text-xs text-slate-400 w-20 text-right">
        {{ job.discovered_date | relative_time }}
    </td>
</tr>
