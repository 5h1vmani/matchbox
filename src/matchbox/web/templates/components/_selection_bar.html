<div id="selection-bar"
     x-show="selected.length > 0"
     x-cloak
     x-transition:enter="transition ease-out duration-150"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     class="fixed bottom-4 left-1/2 -translate-x-1/2 z-30
            bg-slate-900 text-white shadow-xl rounded-xl px-4 py-2.5 flex items-center gap-3 text-sm">

    <span><strong x-text="selected.length"></strong> selected</span>
    <span class="text-slate-400 text-xs"
          x-text="estimatedCost > 0 ? '· est. $' + estimatedCost.toFixed(2) : ''"></span>

    <span class="w-px h-5 bg-slate-700"></span>

    <button type="button"
            @click="bulkAction('/p/{{ active_profile }}/bulk/state', { new_state: 'queued_for_tailor' })"
            class="hover:text-indigo-300 transition flex items-center gap-1.5"
            title="Queue selected jobs for later tailoring">
        Queue <kbd class="bg-slate-700 text-slate-200 text-[10px] px-1 rounded">t</kbd>
    </button>
    <button type="button"
            @click="bulkTailor()"
            class="hover:text-emerald-300 transition flex items-center gap-1.5"
            title="Tailor selected now (LLM, cost confirmation required)">
        Tailor now
    </button>
    <button type="button"
            @click="bulkAction('/p/{{ active_profile }}/bulk/state', { new_state: 'applied' })"
            class="hover:text-indigo-300 transition flex items-center gap-1.5" title="Mark applied">
        Applied <kbd class="bg-slate-700 text-slate-200 text-[10px] px-1 rounded">a</kbd>
    </button>
    <button type="button"
            @click="bulkAction('/p/{{ active_profile }}/bulk/star', {})"
            class="hover:text-amber-300 transition" title="Star/unstar">★ Star</button>
    <button type="button"
            @click="bulkAction('/p/{{ active_profile }}/bulk/state', { new_state: 'discarded' })"
            class="hover:text-rose-300 transition" title="Discard (undoable)">Discard</button>

    <span class="w-px h-5 bg-slate-700"></span>

    <button type="button" @click="clearSelection()"
            class="text-slate-400 hover:text-white text-xs">Clear</button>
</div>

<form id="bulk-form" class="hidden" hx-target="#job-rows"></form>
