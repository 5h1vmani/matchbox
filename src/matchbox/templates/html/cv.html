<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{NAME}} CV</title>
  <style>
    /* Matchbox CV — Pinaka LSAT design system. IBM Plex Sans (headings/body) +
       IBM Plex Mono (eyebrows/dates/labels), zinc grey scale (deliberately no
       accent colour), 1px hairlines. Rendered by weasyprint; fonts embedded as
       base64. ATS-safe: single column, standard headings, real text, no layout
       tables. Metrics render <strong> so numbers survive the six-second scan. */
    @font-face { font-family:'IBM Plex Sans'; font-style:normal; font-weight:400; src:url(data:font/ttf;base64,__SANS_REG_B64__) format('truetype'); }
    @font-face { font-family:'IBM Plex Sans'; font-style:normal; font-weight:600; src:url(data:font/ttf;base64,__SANS_SB_B64__) format('truetype'); }
    @font-face { font-family:'IBM Plex Mono'; font-style:normal; font-weight:400; src:url(data:font/ttf;base64,__MONO_REG_B64__) format('truetype'); }
    @font-face { font-family:'IBM Plex Mono'; font-style:normal; font-weight:600; src:url(data:font/ttf;base64,__MONO_SB_B64__) format('truetype'); }

    * { margin:0; padding:0; box-sizing:border-box; }
    @page { size:A4; margin:14mm; }
    html, body {
      font-family:'IBM Plex Sans', system-ui, sans-serif; font-size:12.5px; line-height:1.5;
      color:#27272a; background:#ffffff; -webkit-font-smoothing:antialiased;
    }
    .page { max-width:100%; }

    /* Header */
    .header { padding-bottom:11px; margin-bottom:15px; border-bottom:1px solid #e4e4e7; }
    .name { font-weight:600; font-size:27px; letter-spacing:-0.02em; color:#09090b; line-height:1.1; margin-bottom:4px; }
    .header-headline { font-weight:600; font-size:15px; color:#18181b; line-height:1.35; margin-bottom:4px; }
    .header-meta { font-size:11.5px; color:#52525b; line-height:1.55; }
    /* Links stay body-grey but underline so they read as clickable on screen
       (recruiters read PDFs digitally); the light underline keeps print calm. */
    .header-meta a { color:#27272a; text-decoration:underline; text-decoration-color:#a1a1aa; text-underline-offset:2px; }
    .header-meta .sep { color:#a1a1aa; margin:0 7px; }

    /* Sections — Mono eyebrow in indigo + hairline rule (the signature treatment) */
    .section { margin-top:15px; }
    .section-header {
      font-family:'IBM Plex Mono'; font-weight:600; font-size:10px; letter-spacing:0.04em;
      text-transform:uppercase; color:#52525b; margin-bottom:9px; padding-bottom:4px;
      border-bottom:1px solid #e4e4e7; page-break-after:avoid; break-after:avoid;
    }

    .summary { font-size:12.5px; line-height:1.55; color:#27272a; page-break-inside:avoid; }

    .competencies { display:flex; flex-wrap:wrap; line-height:1.6; }
    .competency { font-size:11.5px; color:#27272a; }
    .competency:not(:last-child)::after { content:'  ·  '; color:#a1a1aa; }

    /* Entries */
    .entry { margin-bottom:11px; page-break-inside:avoid; break-inside:avoid; orphans:2; widows:2; }
    .entry-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:1px; }
    .entry-title { font-weight:600; font-size:14px; color:#09090b; }
    .entry-company { font-weight:400; color:#27272a; }
    .entry-dates { font-family:'IBM Plex Mono'; font-weight:400; font-size:10px; color:#52525b; white-space:nowrap; }
    .entry-location { font-family:'IBM Plex Mono'; font-size:10px; color:#52525b; margin-bottom:5px; }
    .entry-description { font-size:12.5px; line-height:1.5; margin-bottom:4px; color:#27272a; }
    .entry-description a { color:#27272a; text-decoration:underline; text-decoration-color:#a1a1aa; text-underline-offset:2px; }
    .entry-bullets { list-style:none; padding:0; margin:0; }
    .entry-bullets li { font-size:12.5px; line-height:1.5; color:#27272a; margin-bottom:3px; padding-left:13px; position:relative; orphans:2; widows:2; }
    .entry-bullets li strong, .entry-description strong { font-weight:600; color:#09090b; }
    .entry-bullets li::before { content:''; position:absolute; left:1px; top:7.5px; width:4px; height:4px; background:#52525b; border-radius:50%; }

    /* Compressed earlier roles */
    .earlier { font-size:11.5px; color:#52525b; line-height:1.5; margin-top:7px; padding-top:7px; border-top:1px dashed #e4e4e7; }
    .earlier strong { color:#09090b; font-weight:600; }

    /* Education */
    .education-entry { margin-bottom:6px; display:flex; justify-content:space-between; align-items:baseline; page-break-inside:avoid; }
    .education-entry .degree { font-weight:600; font-size:12.5px; color:#09090b; }
    .education-entry .school { font-size:11.5px; color:#52525b; }
    .education-entry .dates { font-family:'IBM Plex Mono'; font-size:10px; color:#52525b; white-space:nowrap; }

    /* Skills */
    .skills-row { margin-bottom:4px; font-size:12.5px; line-height:1.5; }
    .skills-row .label { font-weight:600; color:#09090b; }

    @media print {
      html, body { background:#ffffff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      a { color:#27272a; }
      .entry, .education-entry { page-break-inside:avoid; break-inside:avoid; }
      .section-header { page-break-after:avoid; break-after:avoid; }
      p, li { orphans:2; widows:2; }
    }
  </style>
</head>
<body>
  <div class="page">
{{BODY}}
  </div>
</body>
</html>
