name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — the more we know up front, the faster we can fix it.

        **Before filing:** check that this isn't already covered by [docs/troubleshooting.md](https://github.com/5h1vmani/matchbox/blob/main/docs/troubleshooting.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the exact command you ran and the error message you got.
      placeholder: |
        I ran `matchbox tailor demo 5` and got…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      validations:
        required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered list, please. Run against the `demo` profile if possible so we can reproduce.
      placeholder: |
        1. `matchbox seed-demo`
        2. `matchbox web`
        3. Open job 5, click "Tailor now", …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Matchbox version
      description: From `pyproject.toml` or the GitHub release tag you're on.
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.7"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 24.04 / …"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - CLI
        - Web dashboard
        - Both
        - Neither (docs / install / packaging)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Wrap in triple backticks. Redact any PII or API keys.
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I redacted any PII / API keys before submitting.
          required: true
