name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pin uv to the actions/setup-python interpreter rather than a uv-managed
      # download, so the 3.12/3.13 matrix actually tests the versions it claims
      # (and weasyprint resolves the apt-installed Pango/Cairo on the system path).
      UV_PYTHON_PREFERENCE: only-system
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # Develop/CI on the latest stable Python; keep 3.12 (the requires-python
        # floor) tested so we don't claim support we don't verify.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        # Pinned for reproducibility, like ruff in pyproject. Bump deliberately.
        run: pip install uv==0.11.19

      - name: Install weasyprint system libraries (Pango/Cairo for PDF render)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libcairo2

      - name: Install dependencies (from lockfile)
        # --locked asserts uv.lock is in sync with pyproject; a pyproject edit
        # without a re-lock fails CI instead of silently drifting.
        run: uv sync --locked --extra dev

      - name: Lint (ruff)
        run: uv run --no-sync ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run --no-sync ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run --no-sync mypy src/matchbox/

      - name: Tests (pytest + coverage gate)
        # fail_under=80 lives in [tool.coverage.report]; this step fails if the
        # suite drops below it.
        run: uv run --no-sync pytest tests/ -v --cov=src/matchbox --cov-report=term

  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Spell check (codespell)
        uses: codespell-project/actions-codespell@v2
        with:
          # Config is in pyproject.toml [tool.codespell].
          # The action reads it via codespell's --toml option.
          check_filenames: true

  link-check:
    # Soft job: lychee on every PR but doesn't gate merge if a remote URL
    # is flaky. Marked as "continue-on-error" so a 503 elsewhere never
    # blocks shipping correct docs.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --no-progress '**/*.md'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
